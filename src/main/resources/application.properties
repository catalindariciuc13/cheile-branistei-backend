# In spatele proxy-ului Railway, IP-ul real al clientului vine in X-Forwarded-For.
# Fara asta, getRemoteAddr() vede IP-ul proxy-ului si rate limiting-ul pune
# toti vizitatorii intr-o singura galeata.
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Creeaza/actualizeaza automat tabelele la pornire (necesar pentru push_abonamente).
# 'update' nu sterge niciodata date, doar adauga ce lipseste.
spring.jpa.hibernate.ddl-auto=update
